<script>
let sessionToken = null;

async function fazerLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const erro = document.getElementById('msg-erro');

  if (!username || !password) {
    mostrarErro('Preencha usuário e senha.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verificando...';
  erro.style.display = 'none';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.sucesso) {
      document.getElementById('nome-usuario').textContent = data.nome;
      document.getElementById('tela-login').style.display = 'none';
      document.getElementById('tela-sucesso').style.display = 'block';
    } else {
      mostrarErro(data.erro || 'Erro ao fazer login.');
    }
  } catch (e) {
    mostrarErro('Erro de conexão. Tente novamente.');
  }

  btn.disabled = false;
  btn.textContent = 'Entrar';
}

function fazerDownload() {
  const btn = document.getElementById('btn-baixar');
  btn.style.opacity = '0.6';
  btn.style.pointerEvents = 'none';

  // 🔥 REDIRECIONAMENTO DIRETO (CORRIGIDO)
  window.location.href = '/api/download';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});

function mostrarErro(msg) {
  const el = document.getElementById('msg-erro');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
