<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Souzaiosoficial — Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* MANTIVE SEU DESIGN IGUAL */
body { background:#06070a;color:#fff;font-family:'DM Sans',sans-serif;margin:0 }
</style>
</head>

<body>

<div id="tela-admin-login">
  <div style="max-width:380px;margin:100px auto;">
    <h2>Acesso Restrito</h2>

    <input id="a-user" placeholder="Usuário" style="width:100%;padding:10px;margin:5px 0;">
    <input id="a-pass" type="password" placeholder="Senha" style="width:100%;padding:10px;margin:5px 0;">

    <button id="btn-login" style="width:100%;padding:12px;background:#5a45b0;color:#fff;border:none;">
      Entrar no Painel
    </button>

    <div id="a-erro" style="color:red;margin-top:10px;display:none;"></div>
  </div>
</div>

<div id="tela-painel" style="display:none;padding:20px;">
  <h2>Painel</h2>

  <input id="novo-user" placeholder="Usuário">
  <input id="novo-pass" placeholder="Senha">
  <button onclick="criarUsuario()">Criar</button>

  <div id="msg-criar"></div>
</div>

<script>
let adminToken = null;

// LOGIN
async function loginAdmin() {
  const u = document.getElementById('a-user').value;
  const p = document.getElementById('a-pass').value;
  const erro = document.getElementById('a-erro');

  erro.style.display = 'none';

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: u, password: p })
    });

    const data = await res.json();

    if (data.sucesso) {
      adminToken = data.token;

      document.getElementById('tela-admin-login').style.display = 'none';
      document.getElementById('tela-painel').style.display = 'block';
    } else {
      erro.textContent = data.erro || 'Erro';
      erro.style.display = 'block';
    }

  } catch (e) {
    erro.textContent = 'Erro conexão';
    erro.style.display = 'block';
  }
}

// CRIAR USUARIO
async function criarUsuario() {
  const username = document.getElementById('novo-user').value;
  const password = document.getElementById('novo-pass').value;
  const msg = document.getElementById('msg-criar');

  try {
    const res = await fetch('/api/admin/gerar', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-admin-token': adminToken
      },
      body: JSON.stringify({
        usuario: username,
        senha: password,
        tempo: 1440
      })
    });

    const data = await res.json();

    if (data.sucesso) {
      msg.textContent = 'Criado com sucesso';
    } else {
      msg.textContent = 'Erro ao criar';
    }

  } catch (e) {
    msg.textContent = 'Erro conexão';
  }
}

// BOTÃO LOGIN
document.getElementById('btn-login').addEventListener('click', loginAdmin);
</script>

</body>
</html>
