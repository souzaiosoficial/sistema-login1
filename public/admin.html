<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body {
  background:#06070a;
  color:#fff;
  font-family: Arial;
  padding:20px;
}

.card {
  background:#0d0f14;
  padding:20px;
  border-radius:15px;
  max-width:600px;
  margin:auto;
}

input, button {
  padding:10px;
  margin:5px;
}

button {
  background:#4f8ef7;
  border:none;
  color:#fff;
  cursor:pointer;
}

table {
  width:100%;
  margin-top:20px;
}

td {
  padding:8px;
}
</style>
</head>

<body>

<div class="card">

<h2>Painel Admin</h2>

<div id="login">
<input id="admin-user" placeholder="Usuário">
<input id="admin-pass" type="password" placeholder="Senha">
<button onclick="loginAdmin()">Entrar</button>
</div>

<div id="painel" style="display:none;">

<button onclick="gerarUsuario()">Gerar Acesso</button>

<table border="1">
<thead>
<tr>
<th>Usuário</th>
<th>IP</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</div>

</div>

<script>
let adminToken = null;

// LOGIN ADMIN
async function loginAdmin() {
  const username = document.getElementById('admin-user').value;
  const password = document.getElementById('admin-pass').value;

  const res = await fetch('/api/admin/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username,password})
  });

  const data = await res.json();

  if(data.sucesso){
    adminToken = data.token;
    document.getElementById('login').style.display='none';
    document.getElementById('painel').style.display='block';
    carregarUsuarios();
  } else {
    alert("Erro no login");
  }
}

// GERAR USUÁRIO
async function gerarUsuario() {
  const tempo = prompt("Tempo em minutos:");

  if(!tempo) return;

  const res = await fetch('/api/admin/gerar', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-admin-token': adminToken
    },
    body: JSON.stringify({ tempo: parseInt(tempo) })
  });

  const data = await res.json();

  alert(
`ACESSO GERADO

Usuário: ${data.usuario}
Senha: ${data.senha}

Tempo: ${tempo} minutos`
  );

  carregarUsuarios();
}

// LISTAR
async function carregarUsuarios(){
  const res = await fetch('/api/admin/usuarios', {
    headers:{'x-admin-token':adminToken}
  });

  const lista = await res.json();
  const tabela = document.getElementById('lista');

  tabela.innerHTML = "";

  lista.forEach(u=>{
    tabela.innerHTML += `
      <tr>
        <td>${u.username}</td>
        <td>${u.ip || '-'}</td>
        <td>
          <button onclick="resetar(${u.id})">Reset</button>
          <button onclick="deletar(${u.id})">Excluir</button>
        </td>
      </tr>
    `;
  });
}

// RESET
async function resetar(id){
  await fetch('/api/admin/reset/'+id,{
    method:'POST',
    headers:{'x-admin-token':adminToken}
  });

  alert("Resetado");
  carregarUsuarios();
}

// DELETE
async function deletar(id){
  await fetch('/api/admin/delete/'+id,{
    method:'DELETE',
    headers:{'x-admin-token':adminToken}
  });

  alert("Deletado");
  carregarUsuarios();
}
</script>

</body>
</html>
