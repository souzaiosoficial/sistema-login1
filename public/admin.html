<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Souzaiosoficial — Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
</head>

<body>

<!-- TODO SEU HTML ORIGINAL PERMANECE IGUAL -->

<script>
let adminToken = null;

async function loginAdmin() {
  const u = document.getElementById('a-user').value;
  const p = document.getElementById('a-pass').value;
  const erro = document.getElementById('a-erro');

  erro.style.display = 'none';

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: u, password: p})
    });

    const data = await res.json();

    if (data.sucesso) {
      adminToken = data.token;
      document.getElementById('tela-admin-login').style.display = 'none';
      document.getElementById('tela-painel').style.display = 'block';
      carregarUsuarios();
    } else {
      erro.textContent = data.erro || 'Credenciais inválidas';
      erro.style.display = 'block';
    }
  } catch(e) {
    erro.textContent = 'Erro de conexão';
    erro.style.display = 'block';
  }
}

async function carregarUsuarios() {
  try {
    const res = await fetch('/api/admin/usuarios', {
      headers: {'x-admin-token': adminToken}
    });

    const lista = await res.json();

    const tbody = document.getElementById('tbody');

    const total = lista.length;
    const usados = lista.filter(u => u.usado === 1).length;

    document.getElementById('s-total').textContent = total;
    document.getElementById('s-disp').textContent = total - usados;
    document.getElementById('s-used').textContent = usados;

    document.getElementById('count-label').textContent =
      total + ' acesso(s) cadastrado(s)';

    if (total === 0) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">Nenhum acesso cadastrado ainda.</div></td></tr>';
      return;
    }

    tbody.innerHTML = lista.map(u => `
      <tr>
        <td>${u.id}</td>
        <td>${u.username}</td>
        <td>${u.usado ? 'Utilizado' : 'Disponível'}</td>
        <td>${u.criado_em || '-'}</td>
        <td>${u.usado_em || '-'}</td>
        <td>${u.ip_acesso || '-'}</td>
        <td>
          ${u.usado ? `<button onclick="resetar(${u.id})">Resetar</button>` : ''}
          <button onclick="deletar(${u.id})">Excluir</button>
        </td>
      </tr>
    `).join('');

  } catch(e) {
    console.log(e);
  }
}

async function criarUsuario() {
  const username = document.getElementById('novo-user').value.trim();
  const password = document.getElementById('novo-pass').value.trim();
  const msg = document.getElementById('msg-criar');

  msg.style.display = 'none';

  if (!username || !password) {
    mostrarMsgCriar('Preencha usuário e senha.', 'erro');
    return;
  }

  try {
    const res = await fetch('/api/admin/gerar', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-admin-token': adminToken
      },
      body: JSON.stringify({
        usuario: username,
        senha: password,
        tempo: 1440
      })
    });

    const data = await res.json();

    if (data.sucesso) {
      document.getElementById('novo-user').value = '';
      document.getElementById('novo-pass').value = '';

      mostrarMsgCriar('Acesso criado com sucesso!', 'ok');
      carregarUsuarios();
    } else {
      mostrarMsgCriar(data.erro || 'Erro ao criar.', 'erro');
    }

  } catch(e) {
    mostrarMsgCriar('Erro de conexão.', 'erro');
  }
}

async function resetar(id) {
  await fetch(`/api/admin/reset/${id}`, {
    method:'POST',
    headers:{'x-admin-token':adminToken}
  });

  carregarUsuarios();
}

async function deletar(id) {
  await fetch(`/api/admin/delete/${id}`, {
    method:'DELETE',
    headers:{'x-admin-token':adminToken}
  });

  carregarUsuarios();
}

function mostrarMsgCriar(txt, tipo) {
  const el = document.getElementById('msg-criar');
  el.textContent = txt;
  el.style.display = 'block';
}

</script>

</body>
</html>
